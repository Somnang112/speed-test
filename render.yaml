services:
  - type: web
    name: speed-test
    runtime: php
    buildCommand: composer install --no-dev && npm install && npm run build && php artisan config:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false